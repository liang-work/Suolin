<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans %}Solar Network{% endtrans %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <div id="sidebar-container">
            <!-- 侧边栏内容将通过JavaScript动态加载 -->
        </div>

        <!-- 主体区域 -->
        <div class="main-content">
            <!-- 顶部区域 -->
            <div class="top-bar">
                <h3>{% trans %}首页{% endtrans %}</h3>
            </div>

            <!-- 主页内容区 -->
            <div class="content-area">
                <p>{% trans %}主页内容区（等会再做）{% endtrans %}</p>
            </div>

            <!-- 状态栏 -->
            <div class="status-bar">
                <p>{% trans %}状态栏{% endtrans %}</p>
            </div>
        </div>
    </div>

    <script>
        // 动态加载侧边栏
        fetch('/sidebar')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
            })
            .catch(error => {
                console.error('加载侧边栏失败:', error);
            });
    </script>
</body>
</html>
